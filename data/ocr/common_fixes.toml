# Generic, book-agnostic OCR fixes.
#
# Use this file ONLY for typos that arise from common scanner / OCR
# failure modes and that would never appear in correctly-OCR'd English
# prose. The two main patterns covered here are:
#
#   1. `t -> r` substitution. Old book scans frequently misread the
#      letter "t" as "r" inside words ("che" for "the", "ir" for "it",
#      "bur" for "but", etc.). The cause is usually a worn typeface or
#      a low-DPI scan; the substitution is universal across English
#      books.
#   2. Soft-hyphen / hard-hyphen line breaks. OCR sometimes preserves
#      the typographer's hyphen when collapsing two physical lines
#      into one logical word ("difficul- ties" -> "difficulties").
#
# Anything book- or domain-specific (proper nouns, transliterations,
# canonical terminology) belongs in `books/<slug>/ocr_fixes.toml`, not
# here. The per-book file uses the same `[phrase]` / `[word]` schema.

[phrase]
"difficul- ties" = "difficulties"
"generos- ity" = "generosity"
"oth- ers" = "others"
"or recom-" = "or recommended"
"is recom-" = "is recommended"
"opened ir" = "opened it"
"perform ir" = "perform it"
"if ir was" = "if it was"
"Ir is" = "It is"

