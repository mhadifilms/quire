name: ci

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint-and-test-linux:
    name: Lint + tests (Linux, text engine only)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          # No Vision OCR on Linux; install with the "test" extra only.
          pip install -e ".[test]"
          pip install ruff mypy
      - name: Ruff lint
        run: ruff check quire tests
      - name: Mypy
        run: mypy quire
      - name: Pytest
        run: pytest -q

  test-macos:
    name: Tests on macOS (Vision optional)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          # Vision install may fail on hosted runners; tolerate it.
          pip install -e ".[test]"
          pip install ruff
          pip install ocrmac || echo "ocrmac unavailable on this runner; skipping Vision"
      - name: Ruff lint
        run: ruff check quire tests
      - name: Pytest
        run: pytest -q
